<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign Document</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #6b21ea;
    --brand-hover: #5a1cd0;
    --text: #1a1030;
    --text-muted: #5a4d7a;
    --text-dim: #9ca3af;
    --bg: #f5f5f7;
    --card: #ffffff;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --input-bg: #ffffff;
    --success: #10b981;
    --success-dim: #d1fae5;
    --danger: #ef4444;
    --danger-dim: #fee2e2;
    --warning: #f59e0b;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Lato, -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  .app { max-width: 760px; margin: 0 auto; padding: 24px 16px 48px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 20px 28px;
    background: var(--brand);
    color: #fff;
  }
  .card-header h1 {
    margin: 0;
    font-family: 'Exo 2', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }
  .card-header .subtitle {
    font-size: 13px;
    opacity: .85;
    margin-top: 4px;
  }
  .card-body { padding: 28px; }
  .card-footer {
    padding: 16px 28px;
    background: #f9fafb;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }
  h2 { font-family: 'Exo 2', sans-serif; font-size: 18px; margin: 0 0 8px; }
  p { margin: 0 0 12px; color: var(--text-muted); font-size: 14px; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  input[type="text"], input[type="email"], input[type="number"] {
    width: 100%;
    padding: 11px 14px;
    background: var(--input-bg);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(107,33,234,.12); }
  .btn {
    display: inline-block;
    padding: 12px 24px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: background .15s;
    font-family: inherit;
  }
  .btn:hover:not(:disabled) { background: var(--brand-hover); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border-strong);
  }
  .btn-ghost:hover:not(:disabled) { background: #f9fafb; color: var(--text); }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; }
  .alert {
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .alert-danger { background: var(--danger-dim); color: #991b1b; border: 1px solid var(--danger); }
  .alert-success { background: var(--success-dim); color: #065f46; border: 1px solid var(--success); }
  .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #3b82f6; }
  .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .loading-spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .document-frame {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 32px;
    margin: 20px 0;
    max-height: 60vh;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.7;
  }
  .document-frame h1, .document-frame h2, .document-frame h3 {
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
  }
  .document-frame a { color: var(--brand); }
  .signature-section {
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px;
    margin-top: 20px;
  }
  .agree-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text);
  }
  .agree-row input[type="checkbox"] {
    margin-top: 3px;
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--brand);
  }
  .typed-sig-input {
    font-family: 'Brush Script MT', cursive, serif;
    font-size: 26px;
    font-style: italic;
    padding: 14px 16px;
    text-align: center;
    background: #fff;
    border: 2px dashed var(--border-strong);
  }
  .typed-sig-input:focus { border-color: var(--brand); border-style: solid; }
  .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    padding: 8px 0;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }
  .code-input {
    font-family: Menlo, monospace;
    font-size: 22px;
    letter-spacing: 8px;
    text-align: center;
    padding: 14px;
    text-transform: uppercase;
  }
  .footer-brand {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--text-dim);
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="card">
    <div class="card-body loading" id="initial-loading">
      <div class="loading-spinner"></div>
      <div>Verifying access...</div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  var API_BASE = 'https://api.mysparkplus.app';
  var state = {
    envelopeId: null,
    token: null,
    envelope: null,
    signed: false
  };

  // Parse envelope_id and token from URL
  // Expected: /env_xxx/jwt-token-string
  function parseUrl(){
    var parts = window.location.pathname.split('/').filter(Boolean);
    if(parts.length < 2) return null;
    return { envelopeId: parts[0], token: parts[1] };
  }

  function el(id){ return document.getElementById(id); }
  function escapeHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function render(html){
    el('app').innerHTML = '<div class="card">' + html + '</div>';
  }

  function renderError(title, message){
    render(
      '<div class="card-header"><h1>' + escapeHtml(title) + '</h1></div>' +
      '<div class="card-body">' +
        '<div class="alert alert-danger">' + escapeHtml(message) + '</div>' +
        '<p>If you believe this is an error, please contact the sender of the document.</p>' +
      '</div>' +
      '<div class="card-footer">Powered by MySpark+</div>'
    );
  }

  function renderLoading(text){
    render(
      '<div class="card-body loading">' +
        '<div class="loading-spinner"></div>' +
        '<div>' + escapeHtml(text || 'Loading...') + '</div>' +
      '</div>'
    );
  }

  // STEP 1: Fetch envelope (returns masked email so we can show "send code to s***@example.com")
  async function loadEnvelope(){
    try {
      var r = await fetch(API_BASE + '/api/contracts/public/get?envelope_id=' + encodeURIComponent(state.envelopeId) + '&token=' + encodeURIComponent(state.token));
      var data = await r.json();
      if(!r.ok){
        renderError('Link not available', data.error || 'This link is no longer valid.');
        return;
      }
      state.envelope = data.envelope;
      if (data.envelope.require_email_verification) {
        renderEmailVerifyPrompt();
      } else {
        renderDocument();
      }
    } catch(e) {
      console.error(e);
      renderError('Connection error', 'We could not reach the server. Please try again in a moment.');
    }
  }

  // STEP 2: Ask user to confirm before sending code
  function renderEmailVerifyPrompt(){
    var env = state.envelope;
    render(
      '<div class="card-header">' +
        '<h1>' + escapeHtml(env.subaccount_name || 'Document to Sign') + '</h1>' +
        '<div class="subtitle">' + escapeHtml(env.title) + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<h2>Verify it is you</h2>' +
        '<p>To protect this document, we will send a one-time verification code to <strong>' + escapeHtml(env.recipient_email_masked || 'your email') + '</strong>.</p>' +
        '<div id="verify-error"></div>' +
        '<div class="btn-row" style="margin-top:20px">' +
          '<button class="btn" id="verify-send-btn" onclick="window._cs.sendCode()">Send verification code</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-footer">Powered by MySpark+</div>'
    );
  }

  // STEP 3: Send code
  async function sendCode(){
    var btn = el('verify-send-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
      var r = await fetch(API_BASE + '/api/contracts/public/verify-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ envelope_id: state.envelopeId, token: state.token, action: 'send_code' })
      });
      var data = await r.json();
      if(!r.ok){
        showVerifyError(data.error || 'Could not send code. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Send verification code';
        return;
      }
      renderCodeEntry();
    } catch(e) {
      console.error(e);
      showVerifyError('Connection error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Send verification code';
    }
  }

  function showVerifyError(msg){
    var box = el('verify-error');
    if(box) box.innerHTML = '<div class="alert alert-danger">' + escapeHtml(msg) + '</div>';
  }

  // STEP 4: Code entry
  function renderCodeEntry(){
    var env = state.envelope;
    render(
      '<div class="card-header">' +
        '<h1>' + escapeHtml(env.subaccount_name || 'Document to Sign') + '</h1>' +
        '<div class="subtitle">' + escapeHtml(env.title) + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<h2>Enter verification code</h2>' +
        '<p>A 6-digit code was sent to <strong>' + escapeHtml(env.recipient_email_masked || 'your email') + '</strong>. Check your inbox and enter it below.</p>' +
        '<div class="field">' +
          '<label>Verification code</label>' +
          '<input type="text" class="code-input" id="code-input" maxlength="6" inputmode="numeric" autocomplete="one-time-code" placeholder="000000">' +
        '</div>' +
        '<div id="code-error"></div>' +
        '<div class="btn-row" style="margin-top:16px">' +
          '<button class="btn btn-ghost" onclick="window._cs.sendCode()">Resend code</button>' +
          '<button class="btn" id="code-submit-btn" onclick="window._cs.submitCode()">Verify and view document</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-footer">Powered by MySpark+</div>'
    );
    setTimeout(function(){ var i = el('code-input'); if(i) i.focus(); }, 50);
  }

  // STEP 5: Submit code, fetch full document on success
  async function submitCode(){
    var input = el('code-input');
    var code = (input.value || '').trim();
    var btn = el('code-submit-btn');
    if(code.length < 4){
      el('code-error').innerHTML = '<div class="alert alert-danger">Please enter the code from your email.</div>';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Verifying...';
    try {
      var r = await fetch(API_BASE + '/api/contracts/public/verify-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ envelope_id: state.envelopeId, token: state.token, action: 'verify_code', code: code })
      });
      var data = await r.json();
      if(!r.ok){
        el('code-error').innerHTML = '<div class="alert alert-danger">' + escapeHtml(data.error || 'Verification failed.') + '</div>';
        btn.disabled = false;
        btn.textContent = 'Verify and view document';
        return;
      }
      // Backend now returns the full envelope including body_html
      state.envelope = Object.assign(state.envelope, data.envelope);
      renderDocument();
    } catch(e) {
      console.error(e);
      el('code-error').innerHTML = '<div class="alert alert-danger">Connection error. Please try again.</div>';
      btn.disabled = false;
      btn.textContent = 'Verify and view document';
    }
  }

  // STEP 6: Document + signature
  function renderDocument(){
    var env = state.envelope;
    render(
      '<div class="card-header">' +
        '<h1>' + escapeHtml(env.subaccount_name || 'Document to Sign') + '</h1>' +
        '<div class="subtitle">' + escapeHtml(env.title) + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="document-frame">' + (env.body_html || '') + '</div>' +
        '<div class="signature-section">' +
          '<div class="agree-row">' +
            '<input type="checkbox" id="agree-cb" onchange="window._cs.updateSignButton()">' +
            '<label for="agree-cb">' + escapeHtml(env.agree_text || 'I agree to electronically sign this document.') + '</label>' +
          '</div>' +
          '<div class="field">' +
            '<label>Type your full legal name to sign</label>' +
            '<input type="text" class="typed-sig-input" id="typed-name" oninput="window._cs.updateSignButton()" autocomplete="off">' +
          '</div>' +
          '<div id="sign-error"></div>' +
          '<div class="btn-row" style="margin-top:16px">' +
            '<button class="btn" id="sign-btn" onclick="window._cs.submitSignature()" disabled>Sign Document</button>' +
          '</div>' +
        '</div>' +
        '<div class="meta-row">' +
          '<span>Expires: ' + escapeHtml(env.expires_at_formatted || '') + '</span>' +
          '<span>Document ID: ' + escapeHtml(state.envelopeId) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-footer">Your signature is legally binding under the ESIGN Act and UETA. Powered by MySpark+</div>'
    );
  }

  function updateSignButton(){
    var cb = el('agree-cb');
    var name = el('typed-name');
    var btn = el('sign-btn');
    if(!cb || !name || !btn) return;
    var ok = cb.checked && (name.value || '').trim().length > 1;
    btn.disabled = !ok;
  }

  // STEP 7: Submit signature
  async function submitSignature(){
    var name = (el('typed-name').value || '').trim();
    var cb = el('agree-cb');
    if(!cb.checked || !name){ return; }
    var btn = el('sign-btn');
    btn.disabled = true;
    btn.textContent = 'Signing...';
    try {
      var r = await fetch(API_BASE + '/api/contracts/public/sign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          envelope_id: state.envelopeId,
          token: state.token,
          typed_name: name,
          agreed: true
        })
      });
      var data = await r.json();
      if(!r.ok){
        el('sign-error').innerHTML = '<div class="alert alert-danger">' + escapeHtml(data.error || 'Signing failed. Please try again.') + '</div>';
        btn.disabled = false;
        btn.textContent = 'Sign Document';
        return;
      }
      state.signed = true;
      renderSigned(data);
    } catch(e) {
      console.error(e);
      el('sign-error').innerHTML = '<div class="alert alert-danger">Connection error. Please try again.</div>';
      btn.disabled = false;
      btn.textContent = 'Sign Document';
    }
  }

  // STEP 8: Confirmation
  function renderSigned(data){
    var env = state.envelope;
    render(
      '<div class="card-header" style="background:var(--success)">' +
        '<h1>Document signed</h1>' +
        '<div class="subtitle">' + escapeHtml(env.title) + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="alert alert-success"><strong>Thank you.</strong> Your signed copy has been emailed to you for your records.</div>' +
        '<p>You signed this document on ' + escapeHtml(data.signed_at_formatted || 'today') + '.</p>' +
        (data.pdf_download_url ?
          '<div class="btn-row" style="margin-top:20px">' +
            '<a class="btn" href="' + escapeHtml(data.pdf_download_url) + '" target="_blank" rel="noopener">Download signed PDF</a>' +
          '</div>'
        : '') +
      '</div>' +
      '<div class="card-footer">Powered by MySpark+</div>'
    );
  }

  // Boot
  window._cs = { sendCode: sendCode, submitCode: submitCode, submitSignature: submitSignature, updateSignButton: updateSignButton };

  var parsed = parseUrl();
  if(!parsed){
    renderError('Invalid link', 'This signing link is incomplete. Please use the link from your email.');
    return;
  }
  state.envelopeId = parsed.envelopeId;
  state.token = parsed.token;
  loadEnvelope();
})();
</script>
</body>
</html>
