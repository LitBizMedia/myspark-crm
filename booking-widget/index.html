function selectVariation(id) {
  S.variation = (D.variations||[]).find(v => v.id === id);
  render();
}

// ── Step: Staff ───────────────────────────────────────────────────────────────
function renderStaff(el) {
  const widgetType = (D.widget && D.widget.widget_type) || 'service';
  // For service widgets, filter staff by service.assigned_staff. For appointment
  // widgets, the API already filtered staff by widget.staff_ids, so D.staff IS the pool.
  let pool;
  if (widgetType === 'appointment') {
    pool = (D.staff || []);
  } else {
    const assigned = S.service.assigned_staff || [];
    pool = (D.staff||[]).filter(u => assigned.includes(u.id));
  }

  if (!pool.length) {
    const msg = widgetType === 'appointment'
      ? 'No providers configured for this widget. Please contact the business.'
      : 'This service has no assigned providers. Please contact the business to book.';
    el.innerHTML = `<div class="bw-section-title">No Providers Available</div>
      <div class="bw-section-sub">${msg}</div>
      <div class="bw-nav"><button class="bw-btn bw-btn-ghost" onclick="goBack()">&#8249; Back</button></div>`;
    return;
  }

  // For appointment widgets, this is the FIRST step, so no back button.
  const showBack = widgetType !== 'appointment';

  let html = `<div class="bw-section-title">Choose a Provider</div>
    <div class="bw-section-sub">Select who you'd like to see</div>
    <div class="bw-options">`;

  pool.forEach(u => {
    const sel = S.staff?.id === u.id ? 'selected' : '';
    html += `<div class="bw-option ${sel}" onclick="selectStaff('${u.id}')">
      <div class="bw-option-dot" style="background:${u.color||'#6b21ea'}"></div>
      <div>
        <div class="bw-option-name">${esc(u.name)}</div>
      </div>
    </div>`;
  });

  html += `</div><div class="bw-nav">
    ${showBack ? '<button class="bw-btn bw-btn-ghost" onclick="goBack()">&#8249; Back</button>' : '<span></span>'}
    <button class="bw-btn bw-btn-primary" onclick="goNext()" ${!S.staff?'disabled':''}>Continue &rarr;</button>
  </div>`;
  el.innerHTML = html;
}

function selectStaff(id) {
  S.staff = id ? (D.staff||[]).find(u => u.id === id) : null;
  S.date = null; S.time = null;
  render();
}

// ── Step: BOOKING FORM (single-page, Calendly-style for appointment widgets) ──
// This combines patient info, type pick, provider pick, calendar, and time
// slots into one screen. On desktop shows side-by-side. On mobile, the
// calendar pane stays hidden until the form has name + email entered.
function renderBookingForm(el) {
  const types = (D.widget && Array.isArray(D.widget.appointment_types))
    ? D.widget.appointment_types.filter(t => t && t.active !== false)
    : [];
  const providers = D.staff || [];

  // Auto-select if there's only one of each
  if (types.length === 1 && !S.appointment_type) {
    S.appointment_type = types[0];
  }
  if (providers.length === 1 && !S.staff) {
    S.staff = providers[0];
  }

  if (!types.length) {
    el.innerHTML = `<div class="bw-section-title">Unavailable</div>
      <div class="bw-section-sub">No appointment types are configured for this widget.</div>`;
    return;
  }
  if (!providers.length) {
    el.innerHTML = `<div class="bw-section-title">Unavailable</div>
      <div class="bw-section-sub">No providers are configured for this widget.</div>`;
    return;
  }

  // Type picker block (chips for 2-4, dropdown for 5+)
  let typePicker = '';
  if (types.length >= 2) {
    if (types.length <= 4) {
      typePicker = '<div class="bw-type-chips">';
      types.forEach(t => {
        const sel = S.appointment_type?.id === t.id ? 'selected' : '';
        const dur = parseInt(t.duration) || 30;
        const price = parseFloat(t.price) || 0;
        const lbl = t.name + ' · ' + dur + ' min' + (price > 0 ? ' · $' + price.toFixed(2) : '');
        typePicker += `<div class="bw-type-chip ${sel}" onclick="selectBookingType('${t.id}')">${esc(lbl)}</div>`;
      });
      typePicker += '</div>';
    } else {
      typePicker = '<select class="bw-type-dropdown" onchange="selectBookingType(this.value)">';
      typePicker += '<option value="">Select an appointment type</option>';
      types.forEach(t => {
        const sel = S.appointment_type?.id === t.id ? 'selected' : '';
        const dur = parseInt(t.duration) || 30;
        const price = parseFloat(t.price) || 0;
        const lbl = t.name + ' (' + dur + ' min' + (price > 0 ? ', $' + price.toFixed(2) : '') + ')';
        typePicker += `<option value="${t.id}" ${sel}>${esc(lbl)}</option>`;
      });
      typePicker += '</select>';
    }
  }

  // Staff picker block (dropdown when 2+, hidden when 1)
  let staffPicker = '';
  if (providers.length >= 2) {
    staffPicker = '<select class="bw-staff-select" onchange="selectBookingStaff(this.value)">';
    staffPicker += `<option value="">Any provider</option>`;
    providers.forEach(u => {
      const sel = S.staff?.id === u.id ? 'selected' : '';
      staffPicker += `<option value="${u.id}" ${sel}>${esc(u.name || 'Provider')}</option>`;
    });
    staffPicker += '</select>';
  }

  // Total summary
  const subtotal = parseFloat(S.appointment_type?.price ?? 0) || 0;
  const taxable = (S.appointment_type && S.appointment_type.taxable !== false);
  const taxSettings = D.settings.tax || { enabled:false, rate:0, label:'Sales Tax' };
  const taxAmount = (taxSettings.enabled && taxable && taxSettings.rate > 0)
    ? Math.round(subtotal * taxSettings.rate) / 100
    : 0;
  const total = subtotal + taxAmount;

  let summary = '';
  if (S.appointment_type && subtotal > 0) {
    summary = `<div class="bw-summary-inline">
      <div class="bw-summary-row"><span>${esc(S.appointment_type.name)}</span><strong>$${subtotal.toFixed(2)}</strong></div>
      ${taxAmount > 0 ? `<div class="bw-summary-row"><span>${esc(taxSettings.label||'Tax')}</span><strong>$${taxAmount.toFixed(2)}</strong></div>` : ''}
      <hr class="bw-summary-divider">
      <div class="bw-summary-row" style="font-size:14px"><strong>Total</strong><strong>$${total.toFixed(2)}</strong></div>
    </div>`;
  }

  // The calendar+slots are gated. They become visible only when:
  //   1. The form has at least name + email (so we don't waste their effort
  //      picking a time before their info is collected)
  //   2. An appointment type is selected (so the calendar reflects that
  //      type's availability and we don't show empty slots after they pick a date)
  // The type picker itself stays OUTSIDE the gate so the user can see it and
  // engage with it. The staff picker can also live outside the gate.
  const hasMinForm = !!(S.client.name && S.client.email);
  const hasType = !!S.appointment_type;
  const showCalendar = hasMinForm && hasType;

  // Build the gating message based on what's missing
  let gateMessage = '';
  if (!hasMinForm && !hasType && types.length >= 2) {
    gateMessage = 'Enter your name and email above, then pick an appointment type.';
  } else if (!hasMinForm) {
    gateMessage = 'Enter your name and email to see available times.';
  } else if (!hasType && types.length >= 2) {
    gateMessage = 'Pick an appointment type to see available times.';
  }

  // Type picker + staff picker live OUTSIDE the gate (always visible).
  // Calendar + slots live INSIDE the gate.
  const calendarSection = `
    ${renderInlineCalendar()}
    ${renderInlineTimeSlots()}
    <div class="bw-pick-time-msg" id="bw-pick-time-msg">Please pick a time before continuing.</div>
  `;

  el.innerHTML = `
    <div class="bw-booking-grid">
      <div class="bw-booking-pane">
        <div class="bw-booking-pane-title">Your information</div>
        <div class="bw-form">
          <div class="bw-field" id="bw-fld-name">
            <label>Name *</label>
            <input id="c-name" type="text" value="${esc(S.client.name)}" oninput="S.client.name=this.value;onFormFieldChange()" autocomplete="name">
            <div class="bw-field-msg">Required</div>
          </div>
          <div class="bw-field" id="bw-fld-email">
            <label>Email *</label>
            <input id="c-email" type="email" value="${esc(S.client.email)}" oninput="S.client.email=this.value;onFormFieldChange()" autocomplete="email">
            <div class="bw-field-msg">Valid email required</div>
          </div>
          <div class="bw-field" id="bw-fld-phone" style="${D.settings.collect_phone === false ? 'display:none' : ''}">
            <label>Phone${D.settings.collect_phone !== false ? ' *' : ''}</label>
            <input id="c-phone" type="tel" value="${esc(S.client.phone)}" oninput="S.client.phone=this.value;onFormFieldChange&&onFormFieldChange()" autocomplete="tel">
          </div>
          <div class="bw-field" id="bw-fld-notes" style="${D.settings.collect_notes === false ? 'display:none' : ''}">
            <label>Notes <span style="color:var(--text-muted);font-weight:400;text-transform:none">(optional)</span></label>
            <textarea id="c-notes" oninput="S.client.notes=this.value">${esc(S.client.notes)}</textarea>
          </div>
          <input type="text" id="_hp" name="_hp" style="position:absolute;left:-9999px" tabindex="-1" autocomplete="off">
        </div>
        ${summary}
      </div>
      <div class="bw-booking-pane" id="bw-cal-pane">
        <div class="bw-booking-pane-title">Pick a time</div>
        ${typePicker}
        ${staffPicker}
        <div class="bw-booking-pane-sub" id="bw-cal-pane-sub" style="${showCalendar ? 'display:none' : ''}">${gateMessage}</div>
        <div id="bw-cal-pane-content" style="${showCalendar ? '' : 'display:none'}">${calendarSection}</div>
      </div>
    </div>
    ${cancellationPolicyHtml()}
    <div class="bw-nav" style="justify-content:flex-end">
      <button class="bw-btn bw-btn-primary" onclick="submitBookingForm()">${(D.settings.require_payment && subtotal > 0) ? (D.settings.payment_mode === 'none' ? 'Review and confirm &rarr;' : 'Continue to payment &rarr;') : 'Book appointment'}</button>
    </div>
  `;
}

// Re-runs when the user types in the form. Toggles calendar pane visibility
// based on whether the gating conditions (name+email AND type chosen) are met.
function onFormFieldChange() {
  const hasMinForm = !!(S.client.name && S.client.email);
  const hasType = !!S.appointment_type;
  const showCalendar = hasMinForm && hasType;
  const sub = document.getElementById('bw-cal-pane-sub');
  const content = document.getElementById('bw-cal-pane-content');
  if (sub && content) {
    let msg = '';
    const types = (D.widget && Array.isArray(D.widget.appointment_types))
      ? D.widget.appointment_types.filter(t => t && t.active !== false)
      : [];
    if (!hasMinForm && !hasType && types.length >= 2) {
      msg = 'Enter your name and email above, then pick an appointment type.';
    } else if (!hasMinForm) {
      msg = 'Enter your name and email to see available times.';
    } else if (!hasType && types.length >= 2) {
      msg = 'Pick an appointment type to see available times.';
    }
    sub.textContent = msg;
    sub.style.display = showCalendar ? 'none' : '';
    content.style.display = showCalendar ? '' : 'none';
  }
  // Clear field errors as user types
  if (S.client.name) document.getElementById('bw-fld-name')?.classList.remove('bw-field-error');
  if (S.client.email && /^[^@]+@[^@]+\.[^@]+$/.test(S.client.email)) {
    document.getElementById('bw-fld-email')?.classList.remove('bw-field-error');
  }
}

function renderInlineCalendar() {
  const now = new Date();
  const yr = S.cal_year, mo = S.cal_month;
  const firstDay = new Date(yr, mo, 1).getDay();
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  let days = '';
  DOW.forEach(d => { days += `<div class="bw-cal-dow">${d}</div>`; });
  for (let i=0; i<firstDay; i++) days += `<div class="bw-cal-day empty"></div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = new Date(yr, mo, d);
    const isPast = dt < new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const isTod = dateStr === now.toISOString().split('T')[0];
    const isSel = dateStr === S.date;
    const cls = ['bw-cal-day'];
    if (isPast) cls.push('disabled');
    if (isTod) cls.push('today');
    if (isSel) cls.push('selected');
    const click = isPast ? '' : `onclick="selectBookingDate('${dateStr}')"`;
    days += `<div class="${cls.join(' ')}" ${click}>${d}</div>`;
  }

  return `<div class="bw-cal" style="box-shadow:none;border:1px solid var(--border)">
    <div class="bw-cal-head">
      <button class="bw-cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="bw-cal-title">${monthNames[mo]} ${yr}</div>
      <button class="bw-cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="bw-cal-grid" style="padding:8px">${days}</div>
  </div>`;
}

function renderInlineTimeSlots() {
  if (!S.date) {
    return '<div style="margin-top:14px;font-size:12px;color:var(--text-muted)">Pick a date above to see available times.</div>';
  }
  if (S.slots_loading) {
    return '<div style="margin-top:14px;font-size:13px;color:var(--text-muted)">Loading times...</div>';
  }
  if (!S.slots.length) {
    return '<div style="margin-top:14px;font-size:13px;color:var(--text-muted)">No available times on this date. Choose another date.</div>';
  }
  const tz = D.settings && D.settings.timezone;
  const tzNote = tz ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px;font-weight:400;text-transform:none;letter-spacing:0">All times shown in ${tzLabel(tz)}</div>` : '';
  let html = '<div style="margin-top:14px;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Available times' + tzNote + '</div>';
  html += '<div class="bw-slots">';
  S.slots.forEach(s => {
    const sel = S.time === s.time ? 'selected' : '';
    html += `<div class="bw-slot ${sel}" onclick="selectBookingTime('${s.time}', ${JSON.stringify(s.available_staff||[]).replace(/"/g,'&quot;')})">${fmtTime(s.time)}</div>`;
  });
  html += '</div>';
  return html;
}

function selectBookingType(id) {
  const types = (D.widget && Array.isArray(D.widget.appointment_types)) ? D.widget.appointment_types : [];
  S.appointment_type = id ? types.find(t => t.id === id) : null;
  S.date = null; S.time = null; S.slots = [];
  render();
}

function selectBookingStaff(id) {
  S.staff = id ? (D.staff || []).find(u => u.id === id) : null;
  S.date = null; S.time = null; S.slots = [];
  render();
}

function selectBookingDate(date) {
  S.date = date;
  S.time = null;
  S.slots = [];
  loadSlots();
  render();
}

function selectBookingTime(time, available) {
  S.time = time;
  S.available_staff = available || [];
  document.getElementById('bw-pick-time-msg')?.classList.remove('show');
  render();
}

function changeMonth(delta) {
  S.cal_month += delta;
  if (S.cal_month < 0) { S.cal_month = 11; S.cal_year--; }
  if (S.cal_month > 11) { S.cal_month = 0; S.cal_year++; }
  render();
}

// Validate form, advance to payment step (or directly submit if no payment).
function submitBookingForm() {
  let ok = true;

  // Name
  if (!S.client.name || !S.client.name.trim()) {
    document.getElementById('bw-fld-name')?.classList.add('bw-field-error');
    ok = false;
  }
  // Email
  if (!S.client.email || !/^[^@]+@[^@]+\.[^@]+$/.test(S.client.email)) {
    document.getElementById('bw-fld-email')?.classList.add('bw-field-error');
    ok = false;
  }
  // Appointment type
  if (!S.appointment_type) {
    alert('Please pick an appointment type.');
    ok = false;
  }
  // Time
  if (!S.time) {
    document.getElementById('bw-pick-time-msg')?.classList.add('show');
    ok = false;
  }

  if (!ok) return;

  // For 'any' staff, we leave S.staff null and pass staff_id='any' to the
  // backend. The backend uses widget.round_robin_config.strategy to pick a
  // provider (random or least_busy). The frontend used to pre-resolve to
  // alphabetical first, which meant the same provider always got every booking.
  // The backend has full data (today's appointment counts, who's already
  // booked at this time) so the selection happens server-side.

  // Move to next step. visibleSteps decides if it's payment or confirm.
  const vs = visibleSteps();
  const idx = vs.indexOf(S.step);
  if (idx < 0 || idx >= vs.length - 1) return;
  const next = vs[idx + 1];
  if (next === 'payment') {
    S.step = 'payment';
    render();
  } else {
    // No payment required; submit immediately
    submitBooking();
  }
}

// ── Step: CLASS REGISTRATION FORM (single-page for class widgets) ───────────
// Patient picks an upcoming session and fills name/email. Capacity is shown
// per session. The backend enforces capacity atomically when registering.
function renderClassesForm(el) {
  const sessions = (D.class_sessions || []).filter(s => s && s.spots_remaining > 0);
  const allSessions = D.class_sessions || [];

  // Build a map of service_id -> service name for display
  const svcMap = {};
  (D.services || []).forEach(s => { svcMap[s.id] = s; });
  // Build a map of staff_id -> name
  const staffMap = {};
  (D.staff || []).forEach(u => { staffMap[u.id] = u; });

  // Patient info form (left pane)
  let summary = '';
  if (S.class_session) {
    const sess = S.class_session;
    const svc = svcMap[sess.service_id];
    const instr = staffMap[sess.instructor_id];
    const datePretty = fmtDate(sess.date);
    const timePretty = fmtTime(sess.time);
    const tzSuffix = (D.settings && D.settings.timezone) ? ' ' + tzLabel(D.settings.timezone) : '';
    const priceLine = sess.price > 0 ? `<div class="bw-summary-row"><span>Price</span><span>$${sess.price.toFixed(2)}</span></div>` : '';
    summary = `<div class="bw-summary">
      <div class="bw-summary-title">Selected Class</div>
      <div class="bw-summary-row"><span>Class</span><span>${esc(svc ? svc.name : sess.title)}</span></div>
      <div class="bw-summary-row"><span>Date</span><span>${datePretty}</span></div>
      <div class="bw-summary-row"><span>Time</span><span>${timePretty}${tzSuffix}</span></div>
      ${instr ? `<div class="bw-summary-row"><span>Instructor</span><span>${esc(instr.name)}</span></div>` : ''}
      ${priceLine}
    </div>`;
  }

  // Filter sessions by date range based on the active chip.
  // Defaults to 'this_week' on first render so patients see imminent sessions first.
  // Computed locally in JS to avoid re-fetching from the Lambda.
  function dateRangeForFilter(filter) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dow = today.getDay();   // 0=Sun..6=Sat
    // Monday-anchored week (closer to common scheduling). Mon offset:
    const daysFromMon = (dow + 6) % 7;
    const startOfWeek = new Date(today);
    startOfWeek.setDate(today.getDate() - daysFromMon);
    const endOfWeek = new Date(startOfWeek);
    endOfWeek.setDate(startOfWeek.getDate() + 6);

    if (filter === 'next_week') {
      const nws = new Date(startOfWeek); nws.setDate(startOfWeek.getDate() + 7);
      const nwe = new Date(nws); nwe.setDate(nws.getDate() + 6);
      return { start: nws, end: nwe };
    }
    if (filter === 'this_month') {
      const mStart = new Date(today.getFullYear(), today.getMonth(), 1);
      const mEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
      return { start: mStart, end: mEnd };
    }
    if (filter === 'all') {
      return { start: today, end: new Date(2100, 0, 1) };
    }
    // default: this_week
    return { start: today, end: endOfWeek };  // start at today (not Monday in past) for this week
  }

  const filter = S.class_filter || 'this_week';
  const range = dateRangeForFilter(filter);
  const startStr = range.start.toISOString().slice(0, 10);
  const endStr = range.end.toISOString().slice(0, 10);
  const filteredSessions = allSessions.filter(s => s.date >= startStr && s.date <= endStr);

  // Count per-chip so we can show "(12)" badges and grey out empty options
  function countForFilter(f) {
    const r = dateRangeForFilter(f);
    const sStr = r.start.toISOString().slice(0, 10);
    const eStr = r.end.toISOString().slice(0, 10);
    return allSessions.filter(s => s.date >= sStr && s.date <= eStr).length;
  }

  const chips = [
    { id: 'this_week',  label: 'This Week' },
    { id: 'next_week',  label: 'Next Week' },
    { id: 'this_month', label: 'This Month' },
    { id: 'all',        label: 'All' }
  ];
  let chipsHtml = '<div class="bw-class-filters" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
  chips.forEach(c => {
    const count = countForFilter(c.id);
    const active = filter === c.id;
    const empty = count === 0;
    const bg = active ? 'var(--brand)' : (empty ? 'transparent' : 'var(--bg-card)');
    const color = active ? '#fff' : (empty ? 'var(--text-muted)' : 'var(--text)');
    const border = active ? 'var(--brand)' : 'var(--border)';
    const cursor = empty && !active ? 'not-allowed' : 'pointer';
    const opacity = empty && !active ? '0.5' : '1';
    const onclick = empty && !active ? '' : `onclick="setClassFilter('${c.id}')"`;
    chipsHtml += `<button type="button" ${onclick} style="padding:6px 12px;border:1.5px solid ${border};background:${bg};color:${color};border-radius:999px;font-size:12px;font-weight:600;cursor:${cursor};opacity:${opacity};transition:all .15s">${c.label} <span style="opacity:0.7;margin-left:2px">(${count})</span></button>`;
  });
  chipsHtml += '</div>';

  // Timezone disambiguation note for class times
  const tzC = D.settings && D.settings.timezone;
  if (tzC) {
    chipsHtml += `<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">All times shown in ${tzLabel(tzC)}</div>`;
  }

  // Session cards (right pane), grouped by date.
  // Each date gets a header; sessions on that date are compact rows underneath.
  // This scales well from a once-a-week class to multi-class daily schedules.
  let sessionsHtml = chipsHtml;
  if (!allSessions.length) {
    sessionsHtml += '<div class="bw-empty-state" style="padding:32px 16px;text-align:center;color:var(--text-muted);font-size:13px">No upcoming class sessions. Please check back later.</div>';
  } else if (!filteredSessions.length) {
    sessionsHtml += '<div class="bw-empty-state" style="padding:24px 16px;text-align:center;color:var(--text-muted);font-size:13px">No classes in this date range. Try a different filter.</div>';
  } else {
    // Group by date string (sessions already arrive sorted by date,time from the Lambda)
    const groups = {};
    const dateOrder = [];
    filteredSessions.forEach(s => {
      const key = s.date;
      if (!groups[key]) { groups[key] = []; dateOrder.push(key); }
      groups[key].push(s);
    });

    sessionsHtml += '<div class="bw-class-list" style="display:flex;flex-direction:column;gap:14px;max-height:560px;overflow-y:auto;padding-right:4px">';

    dateOrder.forEach(dateKey => {
      const dayLabel = fmtDate(dateKey);
      sessionsHtml += `<div class="bw-class-day-group">
        <div class="bw-class-day-header" style="font-weight:700;font-size:13px;color:var(--text);text-transform:uppercase;letter-spacing:0.04em;padding:6px 0;margin-bottom:6px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-card);z-index:1">${dayLabel}</div>
        <div style="display:flex;flex-direction:column;gap:6px">`;

      groups[dateKey].forEach(sess => {
        const svc = svcMap[sess.service_id];
        const instr = staffMap[sess.instructor_id];
        const isFull = sess.spots_remaining <= 0;
        const isSelected = S.class_session && S.class_session.id === sess.id;
        const timePretty = fmtTime(sess.time);
        const spotsText = isFull ? 'FULL' : `${sess.spots_remaining} left`;
        const spotsColor = isFull ? '#ef4444' : (sess.spots_remaining <= 2 ? '#f59e0b' : '#10b981');
        const priceText = sess.price > 0 ? `$${sess.price.toFixed(2)}` : 'Free';
        const cursor = isFull ? 'not-allowed' : 'pointer';
        const opacity = isFull ? '0.55' : '1';
        const borderColor = isSelected ? 'var(--brand)' : 'var(--border)';
        const bg = isSelected ? 'rgba(107,33,234,0.06)' : 'transparent';
        const onclick = isFull ? '' : `onclick="selectClassSession('${sess.id}')"`;

        sessionsHtml += `<div class="bw-class-row" ${onclick} style="border:1.5px solid ${borderColor};background:${bg};border-radius:6px;padding:10px 12px;cursor:${cursor};opacity:${opacity};transition:all 0.15s;display:flex;align-items:center;gap:10px">
          <div style="font-weight:700;font-size:13px;color:var(--text);min-width:64px;flex-shrink:0">${timePretty}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(svc ? svc.name : sess.title)}</div>
            ${instr ? `<div style="font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">with ${esc(instr.name)}</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:700;font-size:13px;color:var(--text)">${priceText}</div>
            <div style="font-size:10px;font-weight:600;color:${spotsColor};text-transform:uppercase;letter-spacing:0.04em">${spotsText}</div>
          </div>
        </div>`;
      });

      sessionsHtml += '</div></div>';
    });

    sessionsHtml += '</div>';
  }

  // Gating message when no session picked
  const hasMinForm = !!(S.client.name && S.client.email);
  const hasSession = !!S.class_session;

  el.innerHTML = `
    <div class="bw-booking-grid">
      <div class="bw-booking-pane">
        <div class="bw-booking-pane-title">Your information</div>
        <div class="bw-form">
          <div class="bw-field" id="bw-fld-name">
            <label>Name *</label>
            <input id="c-name" type="text" value="${esc(S.client.name)}" oninput="S.client.name=this.value;onClassFormFieldChange()" autocomplete="name">
            <div class="bw-field-msg">Required</div>
          </div>
          <div class="bw-field" id="bw-fld-email">
            <label>Email *</label>
            <input id="c-email" type="email" value="${esc(S.client.email)}" oninput="S.client.email=this.value;onClassFormFieldChange()" autocomplete="email">
            <div class="bw-field-msg">Valid email required</div>
          </div>
          <div class="bw-field" id="bw-fld-phone" style="${D.settings.collect_phone === false ? 'display:none' : ''}">
            <label>Phone${D.settings.collect_phone !== false ? ' *' : ''}</label>
            <input id="c-phone" type="tel" value="${esc(S.client.phone)}" oninput="S.client.phone=this.value;onFormFieldChange&&onFormFieldChange()" autocomplete="tel">
          </div>
          <div class="bw-field" id="bw-fld-notes" style="${D.settings.collect_notes === false ? 'display:none' : ''}">
            <label>Notes <span style="color:var(--text-muted);font-weight:400;text-transform:none">(optional)</span></label>
            <textarea id="c-notes" oninput="S.client.notes=this.value">${esc(S.client.notes)}</textarea>
          </div>
          <input type="text" id="_hp" name="_hp" style="position:absolute;left:-9999px" tabindex="-1" autocomplete="off">
        </div>
        ${summary}
      </div>
      <div class="bw-booking-pane" id="bw-cal-pane">
        <div class="bw-booking-pane-title">Pick a class</div>
        ${sessionsHtml}
      </div>
    </div>
    ${cancellationPolicyHtml()}
    <div class="bw-nav" style="justify-content:flex-end">
      <button class="bw-btn bw-btn-primary" onclick="submitClassesForm()">${(D.settings.require_payment && S.class_session && S.class_session.price > 0) ? 'Continue to payment &rarr;' : 'Register'}</button>
    </div>
  `;
}

function onClassFormFieldChange() {
  // Clear field errors as user types
  if (S.client.name) document.getElementById('bw-fld-name')?.classList.remove('bw-field-error');
  if (S.client.email && /^[^@]+@[^@]+\.[^@]+$/.test(S.client.email)) {
    document.getElementById('bw-fld-email')?.classList.remove('bw-field-error');
  }
}

function selectClassSession(sessionId) {
  const sess = (D.class_sessions || []).find(s => s.id === sessionId);
  if (!sess || sess.spots_remaining <= 0) return;
  S.class_session = sess;
  render();
}

function setClassFilter(filter) {
  S.class_filter = filter;
  // Selected session stays selected even if it falls outside the visible range -
  // the summary card on the left shows it. The patient can still register.
  render();
}

function submitClassesForm() {
  let ok = true;
  if (!S.client.name || !S.client.name.trim()) {
    document.getElementById('bw-fld-name')?.classList.add('bw-field-error');
    ok = false;
  }
  if (!S.client.email || !/^[^@]+@[^@]+\.[^@]+$/.test(S.client.email)) {
    document.getElementById('bw-fld-email')?.classList.add('bw-field-error');
    ok = false;
  }
  if (!S.class_session) {
    alert('Please pick a class session.');
    ok = false;
  }
  if (!ok) return;

  // Move to next step: payment if required and class has a price, else submit
  const vs = visibleSteps();
  const idx = vs.indexOf(S.step);
  if (idx < 0 || idx >= vs.length - 1) return;
  const next = vs[idx + 1];
  if (next === 'payment' && S.class_session.price > 0) {
    S.step = 'payment';
    render();
  } else {
    submitBooking();
  }
}

// ── Step: Date ────────────────────────────────────────────────────────────────
function renderDate(el) {
  const now = new Date();
  const yr = S.cal_year, mo = S.cal_month;
  const firstDay = new Date(yr, mo, 1).getDay();
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  let days = '';
  DOW.forEach(d => { days += `<div class="bw-cal-dow">${d}</div>`; });
  for (let i=0; i<firstDay; i++) days += `<div class="bw-cal-day empty"></div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = new Date(yr, mo, d);
    const isPast = dt < new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const isTod = dateStr === now.toISOString().split('T')[0];
    const isSel = dateStr === S.date;
    const cls = [isPast?'past':'available', isTod?'today':'', isSel?'selected':''].join(' ');
    days += `<div class="bw-cal-day ${cls}" ${!isPast?`onclick="selectDate('${dateStr}')"`:''}>${d}</div>`;
  }

  const canPrev = yr > now.getFullYear() || mo > now.getMonth();
  el.innerHTML = `<div class="bw-section-title">Pick a Date</div>
    <div class="bw-section-sub">Select your preferred appointment date</div>
    <div class="bw-cal">
      <div class="bw-cal-head">
        <button class="bw-cal-nav" onclick="calNav(-1)" ${!canPrev?'disabled':''}>&#8249;</button>
        <span class="bw-cal-title">${monthNames[mo]} ${yr}</span>
        <button class="bw-cal-nav" onclick="calNav(1)">&#8250;</button>
      </div>
      <div class="bw-cal-grid">${days}</div>
    </div>
    <div class="bw-nav">
      <button class="bw-btn bw-btn-ghost" onclick="goBack()">&#8249; Back</button>
      <button class="bw-btn bw-btn-primary" onclick="goNext()" ${!S.date?'disabled':''}>Continue &rarr;</button>
    </div>`;
}

function calNav(dir) {
  S.cal_month += dir;
  if (S.cal_month > 11) { S.cal_month = 0; S.cal_year++; }
  if (S.cal_month < 0)  { S.cal_month = 11; S.cal_year--; }
  render();
}

function selectDate(d) {
  S.date = d; S.time = null; S.slots = [];
  render();
  loadSlots();
}

// ── Step: Time ────────────────────────────────────────────────────────────────
async function loadSlots() {
  if (!S.date) return;
  const widgetType = (D.widget && D.widget.widget_type) || 'service';
  if (widgetType === 'appointment') {
    if (!S.appointment_type) return;
  } else {
    if (!S.service) return;
  }
  S.slots_loading = true;
  const staffId = S.staff?.id || 'any';
  try {
    let url;
    if (widgetType === 'appointment') {
      url = `${API}/api/booking/availability?slug=${encodeURIComponent(SLUG)}`
        + `&widget_id=${encodeURIComponent(WIDGET_ID)}`
        + `&appointment_type_id=${encodeURIComponent(S.appointment_type.id)}`
        + `&staff_id=${staffId}&date=${S.date}`;
    } else {
      const varId = S.variation?.id || '';
      url = `${API}/api/booking/availability?slug=${encodeURIComponent(SLUG)}&service_id=${S.service.id}&staff_id=${staffId}&date=${S.date}${varId?'&variation_id='+varId:''}`;
    }
    const r = await fetch(url);
    const data = await r.json();
    S.slots = data.slots || [];
  } catch(e) {
    S.slots = [];
  }
  S.slots_loading = false;
  if (S.step === 'time' || S.step === 'book') render();
}

function renderTime(el) {
  let slotsHtml = '';
  if (S.slots_loading) {
    slotsHtml = `<div class="bw-loading" style="padding:24px"><div class="bw-spinner"></div>Checking availability...</div>`;
  } else if (!S.slots.length) {
    slotsHtml = `<div class="bw-empty">No available times on this date. <a href="#" onclick="event.preventDefault();S.step='date';render()" style="color:var(--brand)">Choose another date</a></div>`;
  } else {
    slotsHtml = `<div class="bw-slots">` + S.slots.map(sl => {
      const sel = sl.time === S.time ? 'selected' : '';
      return `<div class="bw-slot ${sel}" onclick="selectTime('${sl.time}','${(sl.available_staff||[]).join(',')}')">
        ${fmtTime(sl.time)}
      </div>`;
    }).join('') + `</div>`;
  }

  const tzSrv = D.settings && D.settings.timezone;
  const tzNote = tzSrv ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">All times shown in ${tzLabel(tzSrv)}</div>` : '';
  el.innerHTML = `<div class="bw-section-title">Available Times</div>
    <div class="bw-section-sub">${S.date ? fmtDate(S.date) : ''}</div>
    ${tzNote}
    ${slotsHtml}
    <div class="bw-nav">
      <button class="bw-btn bw-btn-ghost" onclick="goBack()">&#8249; Back</button>
      <button class="bw-btn bw-btn-primary" onclick="goNext()" ${!S.time?'disabled':''}>Continue &rarr;</button>
    </div>`;
}

function selectTime(t, staffList) {
  S.time = t;
  S.available_staff = staffList ? staffList.split(',').filter(Boolean) : [];
  render();
}

// ── Step: Info ────────────────────────────────────────────────────────────────
function renderInfo(el) {
  const couponBlock = renderCouponBlock();
  el.innerHTML = `
    ${bookingSummaryHtml(true)}
    <div class="bw-section-title">Your Information</div>
    <div class="bw-section-sub">We'll send your confirmation here</div>
    <div class="bw-form" id="bw-info-form">
      <div class="bw-form-row">
        <div class="bw-field">
          <label>Full Name *</label>
          <input type="text" id="c-name" value="${esc(S.client.name)}" placeholder="Jane Smith" oninput="S.client.name=this.value">
        </div>
        <div class="bw-field">
          <label>Email *</label>
          <input type="email" id="c-email" value="${esc(S.client.email)}" placeholder="jane@example.com" oninput="S.client.email=this.value">
        </div>
      </div>
      <div class="bw-field" style="${D.settings.collect_phone === false ? 'display:none' : ''}">
        <label>Phone${D.settings.collect_phone !== false ? ' *' : ''}</label>
        <input type="tel" id="c-phone" value="${esc(S.client.phone)}" placeholder="(555) 000-0000" oninput="S.client.phone=this.value">
      </div>
      <div class="bw-field" style="${D.settings.collect_notes === false ? 'display:none' : ''}">
        <label>Notes for provider</label>
        <textarea id="c-notes" placeholder="Any special requests or information..." oninput="S.client.notes=this.value">${esc(S.client.notes)}</textarea>
      </div>
      ${couponBlock}
    </div>
    ${cancellationPolicyHtml()}
    <div class="bw-nav">
      <button class="bw-btn bw-btn-ghost" onclick="goBack()">&#8249; Back</button>
      <button class="bw-btn bw-btn-primary bw-btn-full" onclick="validateInfo()" id="bw-info-submit" ${S.loading?'disabled':''} style="${S.loading?'opacity:.65;cursor:not-allowed':''}">
        ${S.loading
          ? '<span style="display:inline-flex;align-items:center;gap:8px"><span style="width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite"></span>Booking...</span>'
          : (()=>{const vs=visibleSteps();return vs[vs.indexOf('info')+1]==='confirm'?'Confirm Booking':'Continue →';})()
        }
      </button>
    </div>`;
}

function renderCouponBlock() {
  const subtotal = parseFloat(S.class_session?.price ?? S.variation?.price ?? S.appointment_type?.price ?? S.service?.price ?? 0) || 0;
  if (subtotal <= 0) return ''; // no coupon for free services
  if (D.settings.allow_coupons === false) return ''; // widget has coupons disabled
  const applied = !!S.coupon_code;
  const validating = !!S.coupon_validating;
  const status = S.coupon_status; // 'success' | 'error' | null
  const msg = S.coupon_message || '';

  if (applied) {
    return `<div class="bw-field" style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);border-radius:var(--radius-sm);padding:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div>
          <div style="font-size:13px;font-weight:600;color:#10b981">Coupon "${esc(S.coupon_code)}" applied</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">You're saving $${(S.coupon_discount||0).toFixed(2)}</div>
        </div>
        <button type="button" class="bw-btn bw-btn-ghost" style="padding:6px 12px;font-size:12px" onclick="removeCoupon()">Remove</button>
      </div>
    </div>`;
  }

  return `<div class="bw-field">
    <label>Coupon Code <span style="color:var(--text-muted);font-weight:400;text-transform:none">(optional)</span></label>
    <div style="display:flex;gap:8px">
      <input type="text" id="c-coupon" value="${esc(S.coupon_input||'')}" placeholder="Enter code" oninput="S.coupon_input=this.value.toUpperCase().trim();this.value=S.coupon_input" style="text-transform:uppercase;flex:1" ${validating?'disabled':''}>
      <button type="button" class="bw-btn bw-btn-ghost" onclick="applyCoupon()" ${validating?'disabled':''} style="white-space:nowrap;padding:0 16px">${validating?'Checking...':'Apply'}</button>
    </div>
    ${status==='error' ? `<div style="font-size:12px;color:#ef4444;margin-top:6px">${esc(msg)}</div>` : ''}
  </div>`;
}

async function applyCoupon() {
  const code = (S.coupon_input||'').trim().toUpperCase();
  if (!code) return;
  S.coupon_validating = true;
  S.coupon_status = null;
  S.coupon_message = '';
  render();
  try {
    const subtotal = parseFloat(S.class_session?.price ?? S.variation?.price ?? S.appointment_type?.price ?? S.service?.price ?? 0) || 0;
    const r = await fetch(`${API}/api/booking/validate-coupon`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        slug: SLUG,
        widget_id: WIDGET_ID,
        coupon_code: code,
        subtotal: subtotal,
        date: S.date
      })
    });
    const data = await r.json();
    S.coupon_validating = false;
    if (!r.ok || !data.valid) {
      S.coupon_status = 'error';
      S.coupon_message = data.error || 'Coupon is not valid.';
      render();
      return;
    }
    S.coupon_code = data.code;
    S.coupon_discount = parseFloat(data.discount) || 0;
    S.coupon_status = 'success';
    S.coupon_message = '';
    S.coupon_input = '';
    render();
  } catch (e) {
    S.coupon_validating = false;
    S.coupon_status = 'error';
    S.coupon_message = 'Could not validate coupon. Please try again.';
    render();
  }
}

function removeCoupon() {
  S.coupon_code = '';
  S.coupon_discount = 0;
  S.coupon_status = null;
  S.coupon_message = '';
  S.coupon_input = '';
  render();
}

function validateInfo() {
  if (S.loading) return;
  S.error = null;
  if (!S.client.name.trim()) { S.error = 'Please enter your name.'; render(); return; }
  if (!S.client.email.trim() || !S.client.email.includes('@')) { S.error = 'Please enter a valid email address.'; render(); return; }
  const vs = visibleSteps();
  const nextStep = vs[vs.indexOf('info') + 1];
  if (nextStep === 'confirm') {
    submitBooking();
  } else {
    goNext();
  }
}

// ── Step: Payment ─────────────────────────────────────────────────────────────
function renderPayment(el) {
  const requirePayment = !!D.settings.require_payment;
  const paymentMode    = D.settings.payment_mode || 'full';
  const tipEnabled = D.settings.tip_enabled;
  const tipPcts = D.settings.tip_percentages || [10,15,20];
  const t = computeTotal();
  const tipBase = t.afterDiscount + t.taxAmount; // tip on post-tax base

  // Compute the actual amount that will be charged.
  // payment_mode='none': no charge, just record
  // payment_mode='deposit': partial charge based on deposit_type+deposit_value
  // payment_mode='full' (default): full total
  let chargeAmount = t.total;
  let depositLabel = '';
  if (requirePayment && paymentMode === 'deposit' && D.settings.deposit_value != null) {
    const dv = parseFloat(D.settings.deposit_value) || 0;
    if (D.settings.deposit_type === 'percent') {
      chargeAmount = Math.round((t.total * dv / 100) * 100) / 100;
    } else if (D.settings.deposit_type === 'flat') {
      chargeAmount = Math.min(Math.round(dv * 100) / 100, t.total);
    }
    if (chargeAmount <= 0) chargeAmount = t.total;
    const balance = Math.max(0, Math.round((t.total - chargeAmount) * 100) / 100);
    depositLabel = `<div class="bw-field" style="background:rgba(107,33,234,.06);border:1px solid var(--brand);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:var(--text)">Deposit due now: $${chargeAmount.toFixed(2)}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px">Balance of $${balance.toFixed(2)} due at your appointment.</div>
    </div>`;
  }
  const willCharge = requirePayment && paymentMode !== 'none' && chargeAmount > 0;

  let tipHtml = '';
  if (tipEnabled && tipBase > 0) {
    const tipOpts = tipPcts.map(p => {
      const amt = (tipBase * p / 100).toFixed(2);
      const active = Math.abs((S.tip||0) - parseFloat(amt)) < 0.005 ? 'active' : '';
      return `<button class="bw-tip-btn ${active}" onclick="setTip(${amt})">${p}% ($${amt})</button>`;
    }).join('');
    tipHtml = `<div class="bw-field" style="margin-top:16px">
      <label>Add a Tip (optional)</label>
      <div class="bw-tip-opts">
        <button class="bw-tip-btn ${(S.tip||0)===0?'active':''}" onclick="setTip(0)">No tip</button>
        ${tipOpts}
        ${D.settings.tip_allow_custom ? `<input class="bw-tip-custom" type="number" min="0" step="0.01" placeholder="Custom $" id="tip-custom" oninput="setCustomTip(this.value)" value="${S.tip_custom||''}">` : ''}
      </div>
    </div>`;
  }

  let payHtml = '';
  if (willCharge) {
    payHtml = `<div class="bw-field" style="margin-top:16px">
      <label>Payment</label>
      <div id="bw-sq-card"><div class="bw-loading" style="padding:12px"><div class="bw-spinner"></div>Loading payment form...</div></div>
    </div>`;
  } else if (requirePayment && paymentMode === 'none') {
    payHtml = `<div class="bw-field" style="margin-top:16px;background:rgba(107,33,234,.06);border:1px solid var(--brand);border-radius:var(--radius-sm);padding:12px">
      <div style="font-size:13px;font-weight:600;color:var(--text)">No payment required</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px">Pay at your appointment.</div>
    </div>`;
  }

  const headline = willCharge ? (paymentMode === 'deposit' ? 'Deposit' : 'Payment') : 'Almost Done';
  const subheadline = willCharge ? 'Enter your payment information' : 'Review your booking details below';
  const ctaLabel = willCharge
    ? `Pay $${chargeAmount.toFixed(2)} and Book`
    : 'Confirm Booking';

  el.innerHTML = `${bookingSummaryHtml(true)}
    <div class="bw-section-title">${headline}</div>
    <div class="bw-section-sub">${subheadline}</div>
    ${depositLabel}
    ${tipHtml}
    ${payHtml}
    <div class="bw-nav">
      <button class="bw-btn bw-btn-ghost" onclick="goBack()">&#8249; Back</button>
      <button class="bw-btn bw-btn-primary bw-btn-full" id="bw-submit-btn" onclick="submitBooking()" ${S.loading?'disabled':''}>
        ${S.loading?'Booking...':ctaLabel}
      </button>
    </div>`;

  if (willCharge) initSquare();
}

function setTip(amt) {
  S.tip = parseFloat(amt) || 0;
  S.tip_custom = '';
  render();
}

function setCustomTip(val) {
  S.tip_custom = val;
  S.tip = parseFloat(val) || 0;
}

async function initSquare() {
  const appId = D.settings.square_app_id;
  const locId = D.settings.square_location_id;
  if (!appId || !locId) {
    const el = document.getElementById('bw-sq-card');
    if (el) el.innerHTML = `<div class="bw-error">Online payment is not configured for this business. Please contact them to book.</div>`;
    return;
  }
  try {
    if (!window.Square) {
      const script = document.createElement('script');
      script.src = D.settings.square_sandbox
        ? 'https://sandbox.web.squarecdn.com/v1/square.js'
        : 'https://web.squarecdn.com/v1/square.js';
      document.head.appendChild(script);
      await new Promise((resolve, reject) => {
        script.onload = resolve;
        script.onerror = () => reject(new Error('Square SDK failed to load'));
        setTimeout(() => reject(new Error('Square SDK load timeout')), 10000);
      });
    }
    S.sq_payments = window.Square.payments(appId, locId);
    S.sq_card = await S.sq_payments.card();
    // Clear loading spinner before Square injects its iframe.
    const target = document.getElementById('bw-sq-card');
    if (target) target.innerHTML = '';
    await S.sq_card.attach('#bw-sq-card');
  } catch(e) {
    console.error('Square init error:', e);
    const el = document.getElementById('bw-sq-card');
    if (el) el.innerHTML = `<div class="bw-error">Payment form unavailable: ${e.message || 'unknown error'}. You can still book and pay at your appointment.</div>`;
  }
}

// ── Submit ────────────────────────────────────────────────────────────────────
async function submitBooking() {
  S.error = null; S.loading = true; render();

  let squareNonce = null;
  const requirePayment = !!D.settings.require_payment;
  const t = computeTotal();

  if (requirePayment && t.total > 0 && S.sq_card) {
    try {
      const result = await S.sq_card.tokenize();
      if (result.status !== 'OK') {
        S.error = result.errors?.[0]?.message || 'Payment error. Please check your card.';
        S.loading = false; render(); return;
      }
      squareNonce = result.token;
    } catch(e) {
      S.error = 'Payment processing failed. Please try again.';
      S.loading = false; render(); return;
    }
  }

  // Determine staff for booking
  // staff_id: 'any' lets the backend pick the provider per the widget's
  // round_robin_config strategy. If user picked a specific provider in the
  // dropdown, S.staff is set and we send that ID.
  const staffId = S.staff?.id || 'any';

  const widgetType = (D.widget && D.widget.widget_type) || 'service';
  const payload = {
    slug: SLUG,
    widget_id: WIDGET_ID,
    staff_id: staffId,
    date: S.date,
    time: S.time,
    client_info: S.client,
    square_nonce: squareNonce,
    tip_amount: S.tip || 0,
    coupon_code: S.coupon_code || '',
    _hp: document.getElementById('_hp')?.value || ''
  };
  if (widgetType === 'appointment') {
    payload.appointment_type_id = S.appointment_type.id;
  } else if (widgetType === 'class') {
    payload.class_session_id = S.class_session.id;
    // Class bookings don't need date/time/staff in the payload - the session
    // row is the source of truth on the backend.
    delete payload.date;
    delete payload.time;
    delete payload.staff_id;
  } else {
    payload.service_id = S.service.id;
    payload.variation_id = S.variation?.id || null;
    payload.variation_name = S.variation?.name || null;
  }

  try {
    const r = await fetch(`${API}/api/booking/submit`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if (!r.ok) {
      S.error = data.error || 'Booking failed. Please try again.';
      S.loading = false; render(); return;
    }
    S.appt_id = data.appointment_id;
    S.payment_receipt = data.payment || null;
    // If backend assigned a provider (staff_id was 'any'), update S.staff
    // so the confirmation screen shows the correct provider name.
    if (!S.staff && data.staff_id) {
      S.staff = (D.staff || []).find(u => u.id === data.staff_id) || null;
    }
    S.loading = false;
    S.step = 'confirm';
    render();
  } catch(e) {
    S.error = 'Connection error. Please try again.';
    S.loading = false; render();
  }
}

// ── Confirm ───────────────────────────────────────────────────────────────────
function renderConfirm(el) {
  const staffUser = S.staff || (S.available_staff?.length
    ? (D.staff||[]).find(u => u.id === S.available_staff[0])
    : null);

  const receipt = S.payment_receipt;
  const customMsg = D.settings.confirm_message || '';
  const taxLabel = (D.settings.tax && D.settings.tax.label) || 'Tax';

  const receiptHtml = receipt && receipt.total > 0 ? `
    <div class="bw-confirm-card" style="margin-top:12px">
      <div style="font-weight:600;margin-bottom:8px;font-size:13px">Receipt</div>
      <div class="bw-confirm-row"><span>Service</span><span>$${(receipt.subtotal||0).toFixed(2)}</span></div>
      ${receipt.coupon_discount > 0 ? `<div class="bw-confirm-row" style="color:#10b981"><span>Coupon discount</span><span>-$${receipt.coupon_discount.toFixed(2)}</span></div>` : ''}
      ${receipt.tax > 0 ? `<div class="bw-confirm-row"><span>${esc(taxLabel)}</span><span>$${receipt.tax.toFixed(2)}</span></div>` : ''}
      ${receipt.tip > 0 ? `<div class="bw-confirm-row"><span>Tip</span><span>$${receipt.tip.toFixed(2)}</span></div>` : ''}
      <div class="bw-confirm-row" style="font-weight:600;padding-top:6px;border-top:1px solid var(--border);margin-top:4px"><span>Total Charged</span><span>$${receipt.total.toFixed(2)}</span></div>
      ${receipt.card_last4 ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px;text-align:right">${esc(receipt.card_brand||'Card')} ending in ${esc(receipt.card_last4)}</div>` : ''}
    </div>` : '';

  // Item label and name vary by widget type
  const widgetType = (D.widget && D.widget.widget_type) || 'service';
  const isClass = widgetType === 'class' || !!S.class_session;
  const itemLabel = isClass ? 'Class' : (widgetType === 'appointment' ? 'Appointment' : 'Service');

  let itemName = '';
  let displayDate = S.date;
  let displayTime = S.time;
  if (S.class_session) {
    const svc = (D.services || []).find(s => s.id === S.class_session.service_id);
    itemName = svc ? svc.name : (S.class_session.title || 'Class');
    displayDate = S.class_session.date;
    displayTime = S.class_session.time;
  } else if (S.appointment_type) {
    itemName = S.appointment_type.name;
  } else if (S.service) {
    itemName = S.service.name + (S.variation ? ` - ${S.variation.name}` : '');
  }

  const headline = isClass ? 'You\'re Registered!' : 'You\'re Booked!';
  const sub = isClass
    ? `A confirmation has been sent to <strong>${esc(S.client.email)}</strong>.<br>See you in class!`
    : `A confirmation has been sent to <strong>${esc(S.client.email)}</strong>.<br>We look forward to seeing you.`;
  const providerLabel = isClass ? 'Instructor' : 'Provider';

  el.innerHTML = `<div class="bw-confirm">
    <div class="bw-confirm-icon">&#10003;</div>
    <div class="bw-confirm-title">${headline}</div>
    <div class="bw-confirm-sub">${sub}</div>
    <div class="bw-confirm-card">
      <div class="bw-confirm-row"><strong>${itemLabel}</strong><span>${esc(itemName)}</span></div>
      <div class="bw-confirm-row"><strong>Date</strong><span>${fmtDate(displayDate)}</span></div>
      <div class="bw-confirm-row"><strong>Time</strong><span>${fmtTime(displayTime)}${D.settings && D.settings.timezone ? ' ' + tzLabel(D.settings.timezone) : ''}</span></div>
      ${staffUser?`<div class="bw-confirm-row"><strong>${providerLabel}</strong><span>${esc(staffUser.name)}</span></div>`:''}
    </div>
    ${receiptHtml}
    ${customMsg ? `<p style="font-size:13px;color:var(--text);line-height:1.6;margin-top:16px;padding:12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)">${esc(customMsg)}</p>` : ''}
    ${D.settings.cancellation_policy_text?`<p style="font-size:12px;color:var(--text-muted);line-height:1.6">${esc(D.settings.cancellation_policy_text)}</p>`:''}
  </div>`;
}

// ── Summary card ──────────────────────────────────────────────────────────────
function bookingSummaryHtml(showTotal) {
  // Bookable item is either a service (with optional variation) or an appointment type.
  const item = S.appointment_type || S.service;
  if (!item) return '';
  const itemName = S.appointment_type
    ? S.appointment_type.name
    : (S.service.name + (S.variation ? ` - ${S.variation.name}` : ''));
  const subtotal = parseFloat(
    S.class_session?.price ?? S.variation?.price ?? S.appointment_type?.price ?? S.service?.price ?? 0
  ) || 0;
  const tipAmt = S.tip || 0;
  const couponDiscount = S.coupon_discount || 0;
  const afterDiscount = Math.max(0, subtotal - couponDiscount);
  const taxable = item.taxable !== false;
  const taxSettings = D.settings.tax || { enabled:false, rate:0, label:'Sales Tax' };
  const taxAmount = (taxSettings.enabled && taxable && taxSettings.rate > 0)
    ? Math.round(afterDiscount * taxSettings.rate) / 100
    : 0;
  const total = afterDiscount + taxAmount + tipAmt;

  const itemLabel = S.appointment_type ? 'Appointment' : 'Service';
  const breakdown = showTotal && subtotal > 0 ? `<hr class="bw-summary-divider">
    <div class="bw-summary-row"><span>${itemLabel}</span><strong>$${subtotal.toFixed(2)}</strong></div>
    ${couponDiscount > 0 ? `<div class="bw-summary-row" style="color:#10b981"><span>Coupon (${esc(S.coupon_code)})</span><strong>-$${couponDiscount.toFixed(2)}</strong></div>` : ''}
    ${taxAmount > 0 ? `<div class="bw-summary-row"><span>${esc(taxSettings.label||'Tax')}</span><strong>$${taxAmount.toFixed(2)}</strong></div>` : ''}
    ${tipAmt > 0 ? `<div class="bw-summary-row"><span>Tip</span><strong>$${tipAmt.toFixed(2)}</strong></div>` : ''}
    <div class="bw-summary-row" style="font-size:15px;padding-top:6px;border-top:1px solid var(--border);margin-top:4px"><span>Total</span><strong>$${total.toFixed(2)}</strong></div>` : '';

  return `<div class="bw-summary">
    <div class="bw-summary-row"><strong>${esc(itemName)}</strong></div>
    ${S.date?`<div class="bw-summary-row"><span>${fmtDate(S.date)} ${S.time?'at '+fmtTime(S.time):''}</span></div>`:''}
    ${S.staff?`<div class="bw-summary-row"><span>with ${esc(S.staff.name)}</span></div>`:''}
    ${breakdown}
  </div>`;
}

// Compute total - mirrors the math in bookingSummaryHtml. Used by submit and payment step.
function computeTotal() {
  const item = S.appointment_type || S.service;
  const subtotal = parseFloat(
    S.class_session?.price ?? S.variation?.price ?? S.appointment_type?.price ?? S.service?.price ?? 0
  ) || 0;
  const tipAmt = S.tip || 0;
  const couponDiscount = S.coupon_discount || 0;
  const afterDiscount = Math.max(0, subtotal - couponDiscount);
  const taxable = item && item.taxable !== false;
  const taxSettings = D.settings.tax || { enabled:false, rate:0, label:'Sales Tax' };
  const taxAmount = (taxSettings.enabled && taxable && taxSettings.rate > 0)
    ? Math.round(afterDiscount * taxSettings.rate) / 100
    : 0;
  return { subtotal, couponDiscount, afterDiscount, taxAmount, tipAmt, total: afterDiscount + taxAmount + tipAmt };
}

function cancellationPolicyHtml() {
  const txt = D.settings.cancellation_policy_text;
  if (!txt) return '';
  return `<div style="font-size:12px;color:var(--text-muted);line-height:1.6;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)">${esc(txt)}</div>`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ampm = h>=12?'PM':'AM';
  return `${h%12||12}:${String(m).padStart(2,'0')} ${ampm}`;
}

// Friendly timezone label from an IANA name. Falls back to the IANA string
// if not in the map. Used to disambiguate times in the widget so a patient
// in a different zone knows which clock the times refer to.
const TZ_LABELS = {
  'America/New_York':'Eastern Time','America/Chicago':'Central Time',
  'America/Denver':'Mountain Time','America/Phoenix':'Mountain Time (Arizona)',
  'America/Los_Angeles':'Pacific Time','America/Anchorage':'Alaska Time',
  'Pacific/Honolulu':'Hawaii Time','America/Toronto':'Eastern Time',
  'America/Vancouver':'Pacific Time','Europe/London':'London Time',
  'Europe/Paris':'Central European Time','Europe/Berlin':'Central European Time',
  'Asia/Tokyo':'Japan Time','Asia/Shanghai':'China Time','Asia/Kolkata':'India Time',
  'Asia/Dubai':'Gulf Time','Australia/Sydney':'Sydney Time','Pacific/Auckland':'New Zealand Time'
};
function tzLabel(iana){
  if(!iana)return '';
  return TZ_LABELS[iana] || iana.split('/').pop().replace(/_/g,' ');
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

function priceStr(s, vars) {
  const prices = [s.price, ...vars.map(v=>v.price)].filter(p=>p!=null).map(p=>parseFloat(p));
  if (!prices.length) return 'Free';
  const mn = Math.min(...prices), mx = Math.max(...prices);
  return mn===mx ? `$${mn.toFixed(2)}` : `$${mn.toFixed(2)} - $${mx.toFixed(2)}`;
}

function durStr(s, vars) {
  const durs = [s.duration_default, ...vars.map(v=>v.duration)].filter(Boolean).map(Number);
  if (!durs.length) return '';
  const mn = Math.min(...durs), mx = Math.max(...durs);
  const fmt = d => d >= 60 ? `${Math.floor(d/60)}h${d%60?` ${d%60}m`:''}` : `${d} min`;
  return mn===mx ? fmt(mn) : `${fmt(mn)} - ${fmt(mx)}`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
